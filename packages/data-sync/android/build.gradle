plugins {
    id 'com.android.library'
    id 'expo-module-gradle-plugin'
    id 'kotlin-android'
    id 'com.google.devtools.ksp'
    id("org.jetbrains.kotlin.plugin.serialization") version "2.1.20"
    id 'org.jlleitschuh.gradle.ktlint' version '14.2.0'
    id 'io.gitlab.arturbosch.detekt' version '1.23.8'
}

group = 'expo.modules.datasyncnativekotlin'
version = '0.1.0'

def qualitySourceDirs = files(
    'src/main/java',
    'src/test/java'
)

def qualityExcludes = [
    '**/build/**',
    '**/.gradle/**',
    '**/generated/**',
    '**/*_Impl.kt',
]

android {
    namespace "expo.modules.datasyncnativekotlin"
    defaultConfig {
        versionCode 1
        versionName "0.1.0"
    }
    lintOptions {
        abortOnError false
    }
}

ktlint {
    android = true
    ignoreFailures = false
    filter {
        qualityExcludes.each { exclude(it) }
        include('**/src/**/*.kt')
    }
}

detekt {
    toolVersion = '1.23.8'
    config.setFrom(files("$projectDir/detekt.yml"))
    buildUponDefaultConfig = true
    parallel = true
    source.setFrom(qualitySourceDirs)
    basePath = projectDir.absolutePath
}

tasks.withType(io.gitlab.arturbosch.detekt.Detekt).configureEach {
    include('**/*.kt')
    qualityExcludes.each { exclude(it) }

    reports {
        html.required.set(true)
        xml.required.set(true)
        sarif.required.set(true)
        md.required.set(false)
    }
}

tasks.named('check').configure {
    dependsOn('ktlintCheck', 'detekt')
}

dependencies {
    implementation 'com.android.identity:identity-jvm:202411.1'

    /**
     * Koin cho Android
     */
    def koin_version = "4.1.0"
    implementation "io.insert-koin:koin-android:$koin_version"

    /**
     * SQLCipher (Encryption)
     */
    implementation "androidx.sqlite:sqlite-ktx:2.6.2"
    implementation "net.zetetic:android-database-sqlcipher:4.5.4"

    /**
     * Room Database
     */
    def room_version = "2.8.4"
    implementation "androidx.room:room-runtime:$room_version"

    // Kotlin Extensions and Coroutines support for Room
    implementation "androidx.room:room-ktx:$room_version"

    // If this project uses any Kotlin source, use Kotlin Symbol Processing (KSP)
    ksp "androidx.room:room-compiler:$room_version"

    //Test helpers
    testImplementation("androidx.room:room-testing:$room_version")

    // Paging 3 Integration
    implementation("androidx.room:room-paging:$room_version")

    /**
     * WorkManager
     */
    def work_version = "2.11.0"
    implementation "androidx.work:work-runtime-ktx:$work_version"

    /**
     * Retrofit
     */
    implementation "com.squareup.retrofit2:retrofit:3.0.0"
    implementation("com.jakewharton.retrofit:retrofit2-kotlinx-serialization-converter:1.0.0")

    /**
     * OkHttp
     */
    def ok_http = "5.3.2"
    implementation("com.squareup.okhttp3:okhttp:$ok_http")
    implementation("com.squareup.okhttp3:logging-interceptor:$ok_http")

    /**
     * Coroutine
     */
    implementation("org.jetbrains.kotlinx:kotlinx-coroutines-android:1.10.2")
    implementation("org.jetbrains.kotlinx:kotlinx-serialization-json:1.8.0")

    /**
     * UnitTest dependency
     */
    // Thư viện cơ bản cho Test
    testImplementation 'junit:junit:4.13.2'

    // MockK để làm giả các DAO và Database
    testImplementation 'io.mockk:mockk:1.14.9'

    // Test Coroutines (suspend function)
    testImplementation 'org.jetbrains.kotlinx:kotlinx-coroutines-test:1.10.2'

    // Thư viện test cho Room
    testImplementation 'androidx.room:room-testing:room_version'

    // Robolectric (Để chạy test Android component trên máy tính mà không cần máy ảo/thiết bị thật)
    testImplementation 'org.robolectric:robolectric:4.16.1'
    testImplementation 'androidx.test:core-ktx:1.7.0'
    testImplementation 'androidx.test.ext:junit-ktx:1.3.0'
}
